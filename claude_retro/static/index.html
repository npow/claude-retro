<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Retro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3347;
  --text: #e4e4e7;
  --text-dim: #8b8fa3;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --orange: #f97316;
  --blue: #3b82f6;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --radius: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
}
a { color: var(--accent2); text-decoration: none; }

/* Single-column layout */
.page { max-width: 860px; margin: 0 auto; padding: 24px 20px 80px; }

/* Top bar */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.top-bar h1 { font-size: 18px; font-weight: 700; color: var(--accent2); }
.top-bar h1 span { color: var(--text-dim); font-weight: 400; }
.refresh-btn {
  background: var(--accent); border: none; border-radius: 6px; color: white;
  padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500;
}
.refresh-btn:hover { background: var(--accent2); }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== THE VERDICT ===== */
.verdict {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 28px 32px; margin-bottom: 32px;
}
.verdict-summary {
  font-size: 20px; font-weight: 600; line-height: 1.5; margin-bottom: 16px;
  color: var(--text);
}
.verdict-summary strong { color: var(--accent2); }
.verdict-bar-wrap { margin-bottom: 12px; }
.verdict-bar {
  height: 24px; border-radius: 6px; overflow: hidden; display: flex;
  background: var(--surface2);
}
.verdict-bar .productive { background: var(--green); transition: width 0.4s; }
.verdict-bar .waste { background: var(--red); opacity: 0.6; transition: width 0.4s; }
.verdict-bar-labels {
  display: flex; justify-content: space-between; font-size: 12px;
  color: var(--text-dim); margin-top: 4px;
}
.verdict-stats {
  display: flex; gap: 24px; flex-wrap: wrap; font-size: 13px; color: var(--text-dim);
}
.verdict-stats .vs { display: flex; align-items: baseline; gap: 6px; }
.verdict-stats .vs strong { font-size: 18px; font-weight: 700; color: var(--text); }

/* ===== CHANGE THESE 3 THINGS ===== */
.section-label {
  font-size: 12px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.8px; font-weight: 600; margin-bottom: 12px;
}
.change-cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px; margin-bottom: 36px;
}
.change-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 18px; border-left: 3px solid var(--accent);
}
.change-card .change-num {
  font-size: 11px; font-weight: 700; color: var(--accent2);
  text-transform: uppercase; margin-bottom: 6px;
}
.change-card .change-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.change-card .change-body { font-size: 13px; color: var(--text-dim); line-height: 1.5; margin-bottom: 6px; }
.change-card .change-link {
  font-size: 12px; color: var(--accent2); cursor: pointer;
}
.change-card .change-link:hover { text-decoration: underline; }

/* ===== SESSION FEED ===== */
.feed-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.filter-bar {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.filter-bar select, .filter-bar input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 6px 10px; font-size: 12px; outline: none;
}
.filter-bar select:focus, .filter-bar input:focus { border-color: var(--accent); }

.session-feed { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }

/* Session card — compact */
.s-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px; cursor: pointer; transition: border-color 0.15s;
}
.s-card:hover { border-color: var(--accent); }
.s-card.expanded { border-color: var(--accent); cursor: default; }
.s-row1 { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.s-outcome {
  font-size: 14px; width: 20px; text-align: center; flex-shrink: 0;
}
.s-prompt {
  flex: 1; font-size: 13px; color: var(--text); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; font-weight: 500;
}
.s-prod {
  font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px;
  white-space: nowrap; flex-shrink: 0;
}
.s-row2 {
  display: flex; align-items: center; gap: 10px; font-size: 12px;
  color: var(--text-dim); padding-left: 30px;
}
.s-row2 .sep { color: var(--border); }
/* Inline problem callout for failed/problematic sessions */
.s-issue {
  display: flex; align-items: center; gap: 6px; font-size: 12px;
  color: var(--red); padding-left: 30px; margin-top: 4px;
}
.s-issue .issue-icon { opacity: 0.7; }

/* Badges */
.badge {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
}
.badge-completed { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-partially_completed { background: rgba(234,179,8,0.15); color: var(--yellow); }
.badge-failed { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-exploratory { background: rgba(6,182,212,0.15); color: var(--cyan); }
.badge-converged { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-drifted { background: rgba(234,179,8,0.15); color: var(--yellow); }
.badge-thrashed { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-abandoned { background: rgba(139,143,163,0.15); color: var(--text-dim); }
.badge-mixed { background: rgba(168,85,247,0.15); color: var(--purple); }
.badge-unknown { background: rgba(139,143,163,0.1); color: var(--text-dim); }
.badge-implement { background: rgba(99,102,241,0.15); color: var(--accent2); }
.badge-debug { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-research { background: rgba(6,182,212,0.15); color: var(--cyan); }
.badge-refactor { background: rgba(168,85,247,0.15); color: var(--purple); }
.badge-brainstorm { background: rgba(234,179,8,0.15); color: var(--yellow); }
.badge-review { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-prototype { background: rgba(249,115,22,0.15); color: var(--orange); }

/* ===== EXPANDED SESSION DETAIL (in-place) ===== */
.s-detail {
  padding: 16px 16px 12px 30px; border-top: 1px solid var(--border);
  margin-top: 10px; animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.s-detail .detail-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }

/* AI analysis in expanded card */
.ai-section { margin-bottom: 14px; }
.ai-section .ai-label {
  font-size: 11px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.3px; margin-bottom: 4px; font-weight: 500;
}
.ai-section .ai-body { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.ai-section .ai-body strong { color: var(--text); }

/* Quality bars */
.quality-bars { display: flex; gap: 20px; margin-bottom: 14px; }
.quality-bar { flex: 1; }
.quality-bar .bar-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
.quality-bar .bar-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.quality-bar .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.quality-bar .bar-value { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* Tags */
.tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; background: rgba(99,102,241,0.1); color: var(--accent2); }

/* Issue items */
.issue-list { margin-bottom: 12px; }
.issue-item {
  display: flex; gap: 8px; padding: 6px 8px; border-radius: 5px;
  margin-bottom: 4px; font-size: 12px;
}
.issue-item.misalignment { background: rgba(239,68,68,0.08); border-left: 3px solid var(--red); }
.issue-item.correction { background: rgba(234,179,8,0.08); border-left: 3px solid var(--yellow); }
.issue-item.underspec { background: rgba(249,115,22,0.08); border-left: 3px solid var(--orange); }
.issue-item .turn-num { color: var(--text-dim); white-space: nowrap; font-weight: 600; }
.issue-item .issue-desc { color: var(--text-dim); }
.issue-item .issue-context {
  margin-top: 4px; padding: 6px 8px; border-radius: 4px;
  font-size: 11px; line-height: 1.4; max-height: 60px; overflow: hidden;
  white-space: pre-wrap; word-break: break-word;
}
.issue-item .issue-context.ctx-user {
  background: rgba(99,102,241,0.08); border-left: 2px solid var(--accent); color: var(--accent2);
}
.issue-item .issue-context.ctx-assistant {
  background: rgba(34,197,94,0.06); border-left: 2px solid var(--green); color: var(--text-dim);
}

/* Productivity bar */
.prod-bar-wrap { margin-bottom: 12px; }
.prod-bar-track { height: 16px; background: var(--surface2); border-radius: 5px; overflow: hidden; display: flex; }
.prod-bar-track .productive { background: var(--green); }
.prod-bar-track .waste { background: var(--red); opacity: 0.6; }
.prod-bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* Tool usage bar chart */
.tool-chart-wrap { margin-bottom: 12px; }
.tool-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; font-size: 12px; }
.tool-bar-name { width: 90px; text-align: right; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
.tool-bar-track { flex: 1; height: 14px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.tool-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
.tool-bar-count { width: 30px; font-size: 11px; color: var(--text-dim); }

/* Collapsible timeline */
.timeline-toggle {
  font-size: 12px; color: var(--accent2); cursor: pointer; margin-bottom: 8px;
  display: inline-block;
}
.timeline-toggle:hover { text-decoration: underline; }
.timeline-content { display: none; max-height: 300px; overflow-y: auto; }
.timeline-content.open { display: block; }
.timeline-entry {
  display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.timeline-entry .te-type { width: 70px; flex-shrink: 0; }
.timeline-entry .te-time { width: 80px; flex-shrink: 0; color: var(--text-dim); }
.timeline-entry .te-detail { color: var(--text-dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Load more */
.load-more {
  text-align: center; padding: 12px; font-size: 13px; color: var(--accent2);
  cursor: pointer;
}
.load-more:hover { text-decoration: underline; }

/* ===== TABS ===== */
.tab-bar {
  display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px;
}
.tab-btn {
  padding: 10px 20px; font-size: 13px; font-weight: 500; color: var(--text-dim);
  cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Chart containers */
.chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 14px; margin-bottom: 20px; }
.chart-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px;
}
.chart-card h3 { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; }
.chart-wrap { position: relative; height: 240px; }

/* Project health table */
.health-table-wrap {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; margin-bottom: 20px;
}
.health-table-wrap h3 { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; color: var(--text-dim); font-weight: 500; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
tr:hover td { background: var(--surface2); }
.row-amber td { background: rgba(234,179,8,0.06); }
.row-red td { background: rgba(239,68,68,0.06); }

/* Heatmap */
.heatmap { display: grid; grid-template-columns: auto repeat(24, 1fr); gap: 2px; font-size: 11px; }
.heatmap-label { padding: 4px 8px; color: var(--text-dim); text-align: right; }
.heatmap-cell {
  aspect-ratio: 1; border-radius: 3px; display: flex; align-items: center;
  justify-content: center; font-size: 10px; color: transparent; transition: all 0.15s;
}
.heatmap-cell:hover { color: var(--text); transform: scale(1.2); }
.heatmap-header { text-align: center; color: var(--text-dim); padding: 2px; }

/* ===== SKILLS TAB ===== */
.radar-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; margin-bottom: 20px;
}
.radar-card h3 { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; }
.radar-wrap { position: relative; height: 320px; max-width: 400px; margin: 0 auto; }

.skill-dims { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; margin-bottom: 20px; }
.skill-dim-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;
}
.skill-dim-header { display: flex; align-items: center; justify-content: space-between; }
.skill-dim-name { font-size: 13px; font-weight: 600; }
.skill-dim-levels { display: flex; gap: 3px; align-items: center; }
.skill-dim-levels .level-dot {
  width: 18px; height: 6px; border-radius: 3px; background: var(--surface2);
}
.skill-dim-levels .level-dot.filled { background: var(--accent); }
.skill-dim-levels .level-dot.opportunity { background: var(--yellow); opacity: 0.5; }
.skill-dim-gap {
  font-size: 11px; color: var(--text-dim); line-height: 1.4;
}

.nudge-cards { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.nudge-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; border-left: 3px solid var(--yellow);
}
.nudge-card .nudge-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;
}
.nudge-card .nudge-dim {
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
}
.nudge-card .nudge-level { font-size: 11px; color: var(--text-dim); }
.nudge-card .nudge-text { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.nudge-card .nudge-dismiss {
  font-size: 11px; color: var(--text-dim); cursor: pointer; margin-top: 4px;
  display: inline-block;
}
.nudge-card .nudge-dismiss:hover { color: var(--text); }

/* Skill badges in session detail */
.skill-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.skill-badge {
  display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px;
  border-radius: 4px; font-size: 10px; font-weight: 600;
  background: rgba(99,102,241,0.1); color: var(--accent2);
}
.skill-badge.has-gap { background: rgba(234,179,8,0.1); color: var(--yellow); }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text-dim); }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }

/* Empty state */
.empty-state { text-align: center; padding: 32px; color: var(--text-dim); font-size: 14px; }
</style>
</head>
<body>

<!-- Loading overlay removed — progress shown inline via refresh-progress bar -->

<div class="page">

  <!-- Top bar -->
  <div class="top-bar">
    <h1>Claude <span>Retro</span></h1>
    <div style="display:flex;align-items:center;gap:8px">
      <select id="concurrency-select" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:12px;outline:none;" title="Parallelism">
        <option value="4">4 parallel</option>
        <option value="8">8 parallel</option>
        <option value="12" selected>12 parallel</option>
        <option value="16">16 parallel</option>
        <option value="24">24 parallel</option>
      </select>
      <button class="refresh-btn" id="refresh-btn" onclick="refreshData()">Run LLM Judge</button>
    </div>
  </div>

  <!-- Refresh progress bar (hidden by default) -->
  <div id="refresh-progress" style="display:none;margin-bottom:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span id="refresh-step" style="font-size:13px;color:var(--text-dim)"></span>
      <span id="refresh-count" style="font-size:12px;color:var(--text-dim)"></span>
    </div>
    <div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">
      <div id="refresh-bar" style="height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width 0.3s"></div>
    </div>
  </div>

  <!-- 1. THE VERDICT -->
  <div class="verdict" id="verdict">
    <div class="loading"><span class="spinner"></span></div>
  </div>

  <!-- 2. CHANGE THESE 3 THINGS -->
  <div id="changes-section" style="display:none">
    <div class="section-label">Change These 3 Things</div>
    <div class="change-cards" id="change-cards"></div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="sessions" onclick="switchTab('sessions')">Sessions</button>
    <button class="tab-btn" data-tab="skills" onclick="switchTab('skills')">Skills</button>
    <button class="tab-btn" data-tab="charts" onclick="switchTab('charts')">Charts</button>
    <button class="tab-btn" data-tab="projects" onclick="switchTab('projects')">Projects</button>
  </div>

  <!-- TAB: Sessions -->
  <div class="tab-content active" id="tab-sessions">
    <div class="feed-header">
      <div class="filter-bar">
        <select id="filter-project"><option value="">All Projects</option></select>
        <select id="filter-sort">
          <option value="started_at DESC">Newest</option>
          <option value="started_at ASC">Oldest</option>
          <option value="productivity ASC">Lowest productivity</option>
          <option value="misalignments DESC">Most misalignments</option>
          <option value="duration DESC">Longest</option>
          <option value="turns DESC">Most turns</option>
        </select>
        <input type="text" id="filter-search" placeholder="Search...">
      </div>
    </div>
    <div class="session-feed" id="session-feed"></div>
    <div class="load-more" id="load-more" style="display:none" onclick="loadMoreSessions()">Load more sessions...</div>
  </div>

  <!-- TAB: Skills -->
  <div class="tab-content" id="tab-skills">
    <div class="radar-card">
      <h3>Skill Profile</h3>
      <div class="radar-wrap"><canvas id="chart-skills-radar"></canvas></div>
    </div>
    <div class="section-label">Dimensions</div>
    <div class="skill-dims" id="skill-dims"></div>
    <div class="section-label">Improvement Nudges</div>
    <div class="nudge-cards" id="skill-nudges"></div>
  </div>

  <!-- TAB: Charts -->
  <div class="tab-content" id="tab-charts">
    <div class="chart-grid">
      <div class="chart-card"><h3>Outcome Distribution</h3><div class="chart-wrap"><canvas id="chart-outcome"></canvas></div></div>
      <div class="chart-card"><h3>Productivity Trend</h3><div class="chart-wrap"><canvas id="chart-trends"></canvas></div></div>
    </div>
    <div class="chart-card" style="margin-bottom:20px">
      <h3>Activity Heatmap</h3>
      <div id="heatmap-container"></div>
    </div>
  </div>

  <!-- TAB: Projects -->
  <div class="tab-content" id="tab-projects">
    <div class="health-table-wrap">
      <h3>Project Health</h3>
      <table id="project-health-table">
        <thead><tr>
          <th data-sort="name">Project</th>
          <th data-sort="sessions">Sessions</th>
          <th data-sort="completion">Completion</th>
          <th data-sort="productivity">Productivity</th>
          <th data-sort="errors">Errors</th>
          <th data-sort="tokens">Tokens</th>
          <th data-sort="cost">Tokens/Sess</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

</div>

<script>
// ===== STATE =====
let charts = {};
let sessionOffset = 0;
const PAGE_SIZE = 30;
let allSessionsLoaded = false;
let expandedSessionId = null;

// ===== HELPERS =====
async function api(path) { const r = await fetch(path); return r.json(); }

function fmtDuration(s) {
  if (!s) return '0m';
  if (s < 60) return s + 's';
  if (s < 3600) return Math.round(s / 60) + 'm';
  return (s / 3600).toFixed(1) + 'h';
}
function fmtPct(v) { return v != null ? (v * 100).toFixed(0) + '%' : '-'; }
function fmtTokens(t) {
  if (!t) return '0';
  if (t < 1000) return t.toString();
  if (t < 1000000) return (t / 1000).toFixed(1) + 'k';
  return (t / 1000000).toFixed(1) + 'M';
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '...' : (s || ''); }
function shortProject(name) { return (name || '').replace(/-Users-npow-code-/g, '').replace(/-Users-npow-/g, ''); }
function destroyChart(key) { if (charts[key]) { charts[key].destroy(); delete charts[key]; } }

function outcomeBadge(o) { return o ? `<span class="badge badge-${o}">${(o || '').replace('_', ' ')}</span>` : ''; }
function intentBadge(i) { return i ? `<span class="badge badge-${i}">${i}</span>` : ''; }
function trajectoryBadge(t) { return t ? `<span class="badge badge-${t}">${t}</span>` : ''; }

function outcomeIcon(outcome) {
  switch (outcome) {
    case 'completed': return '<span style="color:var(--green)">&#10003;</span>';
    case 'partially_completed': return '<span style="color:var(--yellow)">&#9679;</span>';
    case 'failed': return '<span style="color:var(--red)">&#10007;</span>';
    case 'exploratory': return '<span style="color:var(--cyan)">&#9670;</span>';
    default: return '<span style="color:var(--text-dim)">&#9679;</span>';
  }
}

function prodColor(v) {
  if (v == null) return 'var(--text-dim)';
  if (v >= 0.7) return 'var(--green)';
  if (v >= 0.4) return 'var(--yellow)';
  return 'var(--red)';
}


// ===== 1. THE VERDICT =====
async function loadVerdict() {
  const [overview, jStats, patterns] = await Promise.all([
    api('/api/overview'), api('/api/judgments/stats'), api('/api/patterns')
  ]);

  const el = document.getElementById('verdict');

  const unjudged = overview.total_sessions - jStats.total_judged;

  if (jStats.total_judged === 0) {
    // No judgments yet — show basic stats
    el.innerHTML = `
      <div class="verdict-summary">
        <strong>${overview.total_sessions}</strong> sessions across <strong>${overview.total_projects}</strong> projects.
        ${overview.total_hours}h total. Run the LLM Judge to get AI analysis.
      </div>
      <div class="verdict-stats">
        <div class="vs"><strong>${overview.total_sessions}</strong> sessions</div>
        <div class="vs"><strong>${overview.total_hours}</strong> hours</div>
        <div class="vs"><strong>${overview.avg_turns}</strong> avg turns</div>
      </div>`;
    return;
  }

  const od = jStats.outcome_distribution || {};
  const completed = od.completed || 0;
  const partial = od.partially_completed || 0;
  const failed = od.failed || 0;
  const total = jStats.total_judged;
  const completionRate = total > 0 ? ((completed + partial) / total) : 0;
  const prodPct = jStats.avg_productivity || 0;
  const wastePct = 1 - prodPct;

  // Build the summary sentence
  let summaryParts = [];
  summaryParts.push(`<strong>${total}</strong> of ${overview.total_sessions} sessions analyzed.`);
  summaryParts.push(`<strong>${fmtPct(completionRate)}</strong> completed or partially completed.`);

  // Top issue from prompt gaps
  const topGap = patterns.prompt_gaps.length > 0 ? patterns.prompt_gaps[0] : null;
  const topTheme = patterns.misalignment_themes.length > 0 ? patterns.misalignment_themes[0] : null;

  if (topGap && topGap.count >= 2) {
    summaryParts.push(`Your biggest gap: underspecifying <strong>${topGap.category}</strong> (${topGap.count} occurrences).`);
  } else if (topTheme && topTheme.count >= 2) {
    summaryParts.push(`Top misalignment pattern: <strong>${topTheme.theme}</strong> (${topTheme.count} times).`);
  }

  el.innerHTML = `
    <div class="verdict-summary">${summaryParts.join(' ')}</div>
    <div class="verdict-bar-wrap">
      <div class="verdict-bar">
        <div class="productive" style="width:${(prodPct * 100).toFixed(0)}%"></div>
        <div class="waste" style="width:${(wastePct * 100).toFixed(0)}%"></div>
      </div>
      <div class="verdict-bar-labels">
        <span>${fmtPct(prodPct)} productive</span>
        <span>${fmtPct(wastePct)} waste</span>
      </div>
    </div>
    <div class="verdict-stats">
      <div class="vs"><strong>${completed}</strong> completed</div>
      <div class="vs"><strong>${partial}</strong> partial</div>
      <div class="vs"><strong>${failed}</strong> failed</div>
      <div class="vs"><strong>${fmtPct(jStats.avg_clarity)}</strong> avg clarity</div>
      <div class="vs"><strong>${jStats.avg_misalignments}</strong> avg misalign</div>
      ${unjudged > 0 ? `<div class="vs" style="color:var(--text-dim)"><strong>${unjudged}</strong> unjudged</div>` : ''}
    </div>`;

  // Add skill summary line
  try {
    const skillProfile = await api('/api/skills/profile');
    const sp = skillProfile.profile;
    if (sp && window._skillDims) {
      const dims = window._skillDims;
      let best = null, bestScore = -1;
      let gapDim = sp.gap_1;

      for (const d of dims) {
        const num = parseInt(d.id.slice(1));
        const score = sp['d' + num + '_score'] || 0;
        if (score > bestScore) { bestScore = score; best = d; }
      }

      if (best && bestScore > 0) {
        const gapInfo = gapDim ? dims.find(d => d.id === gapDim) : null;
        const gapNum = gapDim ? parseInt(gapDim.slice(1)) : 0;
        const gapScore = gapNum ? (sp['d' + gapNum + '_score'] || 0) : 0;

        let skillLine = `<div style="font-size:13px;color:var(--text-dim);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">`;
        skillLine += `Strongest: <strong style="color:${best.color}">${best.short} (L${Math.floor(bestScore)})</strong>`;
        if (gapInfo) {
          skillLine += ` &middot; Biggest gap: <strong style="color:var(--yellow)">${gapInfo.short} (L${Math.floor(gapScore)} &#8594; L${Math.floor(gapScore) + 1})</strong>`;
        }
        skillLine += `</div>`;
        el.innerHTML += skillLine;
      }
    }
  } catch (e) { /* skill data not available yet */ }

  // Store for use by change cards
  window._patterns = patterns;
  window._jStats = jStats;
  window._overview = overview;
}

// ===== 2. CHANGE THESE 3 THINGS =====
async function loadChangeCards() {
  const [prescriptions, patterns, actions] = await Promise.all([
    api('/api/prescriptions'), api('/api/patterns'), api('/api/actions')
  ]);

  const section = document.getElementById('changes-section');
  const container = document.getElementById('change-cards');
  let cards = [];

  // Pull top 3 prescriptions by confidence
  const topPrescriptions = prescriptions.prescriptions.slice(0, 3);
  topPrescriptions.forEach((p, i) => {
    cards.push({
      num: i + 1,
      title: p.title,
      body: p.description,
      link: p.evidence,
    });
  });

  // If fewer than 3 prescriptions, fill from prompt gap patterns
  if (cards.length < 3 && patterns.prompt_gaps.length > 0) {
    patterns.prompt_gaps.slice(0, 3 - cards.length).forEach(g => {
      cards.push({
        num: cards.length + 1,
        title: `Specify ${g.category} upfront`,
        body: `${g.count} sessions had gaps in ${g.category}. Examples: ${g.examples.slice(0, 2).join(', ')}.`,
        link: `${(g.pct * 100).toFixed(0)}% of all prompt gaps`,
      });
    });
  }

  // If still fewer than 3, fill from actions
  if (cards.length < 3) {
    const usedTitles = new Set(cards.map(c => c.title));
    actions.actions.filter(a => !usedTitles.has(a.title)).slice(0, 3 - cards.length).forEach(a => {
      cards.push({
        num: cards.length + 1,
        title: a.title,
        body: a.body,
        link: a.evidence,
      });
    });
  }

  if (cards.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  container.innerHTML = cards.map(c => `
    <div class="change-card">
      <div class="change-num">#${c.num}</div>
      <div class="change-title">${c.title}</div>
      <div class="change-body">${c.body}</div>
      <div class="change-link">${c.link || ''}</div>
    </div>
  `).join('');
}

// ===== 3. SESSION FEED =====
async function loadSessions(append) {
  if (!append) {
    sessionOffset = 0;
    allSessionsLoaded = false;
    document.getElementById('session-feed').innerHTML = '';
  }

  const project = document.getElementById('filter-project').value;
  const search = document.getElementById('filter-search').value;
  const sort = document.getElementById('filter-sort').value;

  const params = new URLSearchParams({ limit: PAGE_SIZE, offset: sessionOffset, sort });
  if (project) params.set('project', project);
  if (search) params.set('search', search);

  const data = await api('/api/sessions?' + params);
  const feed = document.getElementById('session-feed');

  data.sessions.forEach(s => {
    const card = document.createElement('div');
    card.className = 's-card';
    card.id = 'scard-' + s.session_id;
    card.onclick = () => toggleSession(s.session_id, card);

    const icon = s.judgment_outcome ? outcomeIcon(s.judgment_outcome) : outcomeIcon(null);
    const prod = s.productivity_ratio;
    const prodBg = prod != null
      ? `background:${prod >= 0.7 ? 'rgba(34,197,94,0.1)' : prod >= 0.4 ? 'rgba(234,179,8,0.1)' : 'rgba(239,68,68,0.1)'}; color:${prodColor(prod)}`
      : 'color:var(--text-dim)';

    let html = `
      <div class="s-row1">
        <div class="s-outcome">${icon}</div>
        <div class="s-prompt">${truncate(s.first_prompt, 90)}</div>
        ${prod != null ? `<div class="s-prod" style="${prodBg}">${fmtPct(prod)} prod</div>` : '<div class="s-prod" style="color:var(--border);font-weight:400">unjudged</div>'}
      </div>
      <div class="s-row2">
        <span>${fmtDuration(s.duration_seconds)}</span>
        <span class="sep">&middot;</span>
        <span>${s.turn_count} turns</span>
        <span class="sep">&middot;</span>
        ${intentBadge(s.intent)}
        <span class="sep">&middot;</span>
        <span>${shortProject(s.project_name)}</span>
        <span class="sep">&middot;</span>
        <span>${fmtDate(s.started_at)}</span>
      </div>`;

    // Inline issue callout for problematic sessions
    if (s.misalignment_count && s.misalignment_count > 0) {
      html += `<div class="s-issue">
        <span class="issue-icon">&#9888;</span>
        ${s.misalignment_count} misalignment${s.misalignment_count > 1 ? 's' : ''}
      </div>`;
    }

    card.innerHTML = html;
    feed.appendChild(card);
  });

  sessionOffset += data.sessions.length;

  const loadMoreEl = document.getElementById('load-more');
  if (sessionOffset >= data.total) {
    allSessionsLoaded = true;
    loadMoreEl.style.display = 'none';
  } else {
    loadMoreEl.style.display = 'block';
  }
}

function loadMoreSessions() {
  if (!allSessionsLoaded) loadSessions(true);
}

// ===== SESSION DETAIL (in-place expand) =====
async function toggleSession(sessionId, cardEl) {
  // If already expanded, collapse
  if (expandedSessionId === sessionId) {
    const detail = cardEl.querySelector('.s-detail');
    if (detail) detail.remove();
    cardEl.classList.remove('expanded');
    expandedSessionId = null;
    return;
  }

  // Collapse previous
  if (expandedSessionId) {
    const prev = document.getElementById('scard-' + expandedSessionId);
    if (prev) {
      const d = prev.querySelector('.s-detail');
      if (d) d.remove();
      prev.classList.remove('expanded');
    }
  }

  expandedSessionId = sessionId;
  cardEl.classList.add('expanded');

  // Add loading placeholder
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 's-detail';
  loadingDiv.innerHTML = '<div class="loading"><span class="spinner"></span></div>';
  cardEl.appendChild(loadingDiv);

  // Fetch detail + timeline + skills
  const [detail, timeline, skillsData] = await Promise.all([
    api(`/api/sessions/${sessionId}`),
    api(`/api/sessions/${sessionId}/timeline`),
    api(`/api/skills/session/${sessionId}`),
  ]);

  const s = detail.session;
  const j = detail.judgment;
  const tools = detail.tools;
  const f = detail.features;

  let html = '';

  // Badges row
  html += '<div class="detail-badges">';
  if (j) html += outcomeBadge(j.outcome) + ' ';
  html += intentBadge(s.intent) + ' ' + trajectoryBadge(s.trajectory);
  html += ` <span style="font-size:12px;color:var(--text-dim);margin-left:8px">${shortProject(s.project_name)}</span>`;
  html += '</div>';

  // Skill badges
  if (skillsData.skills) {
    html += renderSkillBadges(skillsData.skills);
  }

  if (j) {
    // Outcome reasoning
    if (j.outcome_reasoning) {
      html += `<div class="ai-section">
        <div class="ai-label">AI Analysis</div>
        <div class="ai-body">${j.outcome_reasoning}</div>
      </div>`;
    }

    // Prompt quality bars
    html += `<div class="quality-bars">
      <div class="quality-bar">
        <div class="bar-label">Clarity</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(j.prompt_clarity||0)*100}%;background:${(j.prompt_clarity||0)>0.6?'var(--green)':'var(--yellow)'}"></div></div>
        <div class="bar-value">${fmtPct(j.prompt_clarity)}</div>
      </div>
      <div class="quality-bar">
        <div class="bar-label">Completeness</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(j.prompt_completeness||0)*100}%;background:${(j.prompt_completeness||0)>0.6?'var(--green)':'var(--yellow)'}"></div></div>
        <div class="bar-value">${fmtPct(j.prompt_completeness)}</div>
      </div>
    </div>`;

    // Missing from prompt
    const missing = j.prompt_missing || [];
    if (missing.length > 0) {
      html += `<div class="ai-section">
        <div class="ai-label">Missing from prompt</div>
        <div class="tag-list">${missing.map(m => `<span class="tag">${m}</span>`).join('')}</div>
      </div>`;
    }

    // Trajectory narrative
    if (j.trajectory_summary) {
      html += `<div class="ai-section">
        <div class="ai-label">Trajectory</div>
        <div class="ai-body">${j.trajectory_summary}</div>
      </div>`;
    }

    // Misalignments + corrections — interleave by turn number with conversation context
    const misalignments = j.misalignments || [];
    const corrections = j.corrections || [];
    if (misalignments.length > 0 || corrections.length > 0) {
      // Build turn map from timeline: turn N -> {type, preview}
      // Same logic as build_session_summary: user prompts and assistant tool batches each get a turn number
      const turnMap = {};
      let turnNum = 0;
      for (const e of timeline.timeline) {
        if (e.entry_type === 'user' && !e.is_tool_result && e.user_text_length > 0) {
          turnNum++;
          turnMap[turnNum] = { type: 'user', preview: truncate(e.preview, 150) };
        } else if (e.entry_type === 'assistant' && e.tool_names && e.tool_names.length) {
          turnNum++;
          turnMap[turnNum] = { type: 'assistant', preview: 'Tools: ' + e.tool_names.join(', ') };
        }
      }

      // Build combined list sorted by turn
      let issues = [];
      misalignments.forEach(m => issues.push({
        turn: m.turn || 0, type: 'misalignment',
        label: 'Claude went wrong',
        desc: m.description || m
      }));
      corrections.forEach(c => issues.push({
        turn: c.turn || 0, type: 'correction',
        label: 'You corrected',
        desc: c.description || c
      }));
      issues.sort((a, b) => a.turn - b.turn);

      html += `<div class="ai-section">
        <div class="ai-label">Misalignments & Corrections (${misalignments.length} + ${corrections.length})</div>
        <div class="issue-list">${issues.map(i => {
          const ctx = turnMap[i.turn];
          const ctxHtml = ctx
            ? `<div class="issue-context ctx-${ctx.type}">${ctx.type === 'user' ? 'You' : 'Claude'}: ${ctx.preview}</div>`
            : '';
          return `<div class="issue-item ${i.type}">
            <span class="turn-num">Turn ${i.turn || '?'}</span>
            <div>
              <span style="font-size:11px;opacity:0.7">${i.label}:</span>
              <span class="issue-desc">${i.desc}</span>
              ${ctxHtml}
            </div>
          </div>`;
        }).join('')}</div>
      </div>`;
    }

    // Productivity bar
    const prodTurns = j.productive_turns || 0;
    const wasteTurns = j.waste_turns || 0;
    const totalProdTurns = prodTurns + wasteTurns;
    if (totalProdTurns > 0) {
      const pp = (prodTurns / totalProdTurns * 100).toFixed(0);
      const wp = (wasteTurns / totalProdTurns * 100).toFixed(0);
      html += `<div class="ai-section">
        <div class="ai-label">Productivity</div>
        <div class="prod-bar-wrap">
          <div class="prod-bar-track">
            <div class="productive" style="width:${pp}%"></div>
            <div class="waste" style="width:${wp}%"></div>
          </div>
          <div class="prod-bar-labels">
            <span>${prodTurns} productive (${pp}%)</span>
            <span>${wasteTurns} waste (${wp}%)</span>
          </div>
        </div>
      </div>`;
    }
  } else {
    // No judgment — show basic stats
    html += `<div class="ai-section">
      <div class="ai-body" style="color:var(--text-dim)">No AI analysis available. Run the LLM Judge to get detailed insights.</div>
    </div>`;
    html += `<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-dim);margin-bottom:12px">
      <span>Duration: ${fmtDuration(s.duration_seconds)}</span>
      <span>Turns: ${s.turn_count}</span>
      <span>Tool uses: ${s.tool_use_count}</span>
      <span>Tool errors: ${s.tool_error_count}</span>
    </div>`;
  }

  // Tool usage (horizontal bar chart, CSS-based)
  if (tools.length > 0) {
    const maxUse = Math.max(...tools.map(t => t.use_count));
    html += `<div class="ai-section">
      <div class="ai-label">Tools</div>
      <div class="tool-chart-wrap">
        ${tools.slice(0, 10).map(t => `
          <div class="tool-bar-row">
            <div class="tool-bar-name">${t.tool_name}</div>
            <div class="tool-bar-track"><div class="tool-bar-fill" style="width:${(t.use_count/maxUse*100).toFixed(0)}%"></div></div>
            <div class="tool-bar-count">${t.use_count}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }

  // Collapsible timeline
  const timelineId = 'tl-' + sessionId;
  html += `<div class="ai-section">
    <div class="timeline-toggle" onclick="event.stopPropagation(); document.getElementById('${timelineId}').classList.toggle('open'); this.innerHTML = document.getElementById('${timelineId}').classList.contains('open') ? '&#9660; Hide timeline (${timeline.timeline.length} entries)' : '&#9654; Show timeline (${timeline.timeline.length} entries)'">
      &#9654; Show timeline (${timeline.timeline.length} entries)
    </div>
    <div class="timeline-content" id="${timelineId}">
      ${timeline.timeline.slice(0, 100).map(e => {
        let detail = '';
        if (e.entry_type === 'user' && !e.is_tool_result) detail = truncate(e.preview, 120);
        else if (e.entry_type === 'assistant' && e.tool_names && e.tool_names.length) detail = 'Tools: ' + e.tool_names.join(', ');
        else if (e.entry_type === 'assistant') detail = truncate(e.preview, 120);
        else if (e.entry_type === 'system') detail = (e.system_subtype || '') + (e.duration_ms ? ` (${(e.duration_ms/1000).toFixed(1)}s)` : '');
        else if (e.is_tool_result) detail = 'Tool result' + (e.tool_result_error ? ' (ERROR)' : '');
        const typeColor = { user: '#6366f1', assistant: '#22c55e', system: '#eab308' }[e.entry_type] || '#8b8fa3';
        return `<div class="timeline-entry">
          <div class="te-type" style="color:${typeColor}">${e.entry_type}${e.is_tool_result ? ' (res)' : ''}</div>
          <div class="te-time">${fmtDate(e.timestamp_utc)}</div>
          <div class="te-detail">${detail}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  loadingDiv.innerHTML = html;
}

// ===== TABS =====
let chartsLoaded = false;
let projectsLoaded = false;
let skillsLoaded = false;

function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tabName}"]`).classList.add('active');
  document.getElementById('tab-' + tabName).classList.add('active');

  // Lazy-load tab content on first view (avoids Chart.js zero-dimension bug)
  if (tabName === 'skills' && !skillsLoaded) {
    skillsLoaded = true;
    loadSkills();
  }
  if (tabName === 'charts' && !chartsLoaded) {
    chartsLoaded = true;
    loadCharts();
  }
  if (tabName === 'projects' && !projectsLoaded) {
    projectsLoaded = true;
    loadProjectHealth();
  }
}

// ===== SKILLS TAB =====
async function loadSkills() {
  const [dims, profile, nudges] = await Promise.all([
    api('/api/skills/dimensions'),
    api('/api/skills/profile'),
    api('/api/skills/nudges'),
  ]);

  const p = profile.profile;
  const dimList = dims.dimensions;

  // Radar chart
  if (p) {
    destroyChart('skillsRadar');
    const labels = dimList.map(d => d.short);
    const scores = dimList.map(d => {
      const num = parseInt(d.id.slice(1));
      return p['d' + num + '_score'] || 0;
    });

    charts.skillsRadar = new Chart(document.getElementById('chart-skills-radar'), {
      type: 'radar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Skill Level',
          data: scores,
          backgroundColor: 'rgba(99,102,241,0.15)',
          borderColor: '#6366f1',
          borderWidth: 2,
          pointBackgroundColor: '#6366f1',
          pointBorderColor: '#6366f1',
          pointRadius: 4,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          r: {
            min: 0,
            max: 5,
            ticks: {
              stepSize: 1,
              color: '#8b8fa3',
              backdropColor: 'transparent',
              font: { size: 10 },
            },
            grid: { color: '#2e3347' },
            angleLines: { color: '#2e3347' },
            pointLabels: { color: '#e4e4e7', font: { size: 11, weight: '500' } },
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `Level ${ctx.raw.toFixed(1)}`,
            }
          }
        }
      }
    });
  }

  // Dimension cards
  const dimsContainer = document.getElementById('skill-dims');
  if (p) {
    const gaps = [p.gap_1, p.gap_2, p.gap_3].filter(Boolean);
    dimsContainer.innerHTML = dimList.map(d => {
      const num = parseInt(d.id.slice(1));
      const score = p['d' + num + '_score'] || 0;
      const level = Math.floor(score);
      const isGap = gaps.includes(d.id);

      let dots = '';
      for (let i = 1; i <= 5; i++) {
        const cls = i <= level ? 'filled' : (isGap && i === level + 1 ? 'opportunity' : '');
        dots += `<div class="level-dot ${cls}" style="${i <= level ? 'background:' + d.color : ''}"></div>`;
      }

      return `<div class="skill-dim-card" style="border-left: 3px solid ${d.color}">
        <div class="skill-dim-header">
          <span class="skill-dim-name">${d.name}</span>
          <div class="skill-dim-levels">${dots}</div>
        </div>
        <div class="skill-dim-gap">
          L${level} (${score.toFixed(1)})${isGap ? ' <span style="color:var(--yellow)">&#9650; gap</span>' : ''}
        </div>
      </div>`;
    }).join('');
  } else {
    dimsContainer.innerHTML = '<div class="empty-state">No skill data yet. Run ingest to analyze sessions.</div>';
  }

  // Nudge cards
  const nudgeContainer = document.getElementById('skill-nudges');
  if (nudges.nudges.length > 0) {
    nudgeContainer.innerHTML = nudges.nudges.map(n => `
      <div class="nudge-card" id="nudge-${n.id}" style="border-left-color:${n.dimension_color}">
        <div class="nudge-header">
          <span class="nudge-dim" style="color:${n.dimension_color}">${n.dimension_name}</span>
          <span class="nudge-level">L${n.current_level} &#8594; L${n.target_level}</span>
        </div>
        <div class="nudge-text">${n.nudge_text}</div>
        <span class="nudge-dismiss" onclick="event.stopPropagation(); dismissNudge(${n.id})">dismiss</span>
      </div>
    `).join('');
  } else {
    nudgeContainer.innerHTML = '<div class="empty-state">No nudges yet.</div>';
  }
}

async function dismissNudge(id) {
  await fetch('/api/skills/nudges/' + id + '/dismiss', { method: 'POST' });
  const el = document.getElementById('nudge-' + id);
  if (el) el.remove();
}

function renderSkillBadges(skills) {
  if (!skills || !window._skillDims) return '';
  const dims = window._skillDims;
  let html = '<div class="skill-badges">';
  for (const d of dims) {
    const num = parseInt(d.id.slice(1));
    const level = skills['d' + num + '_level'] || 0;
    const opp = skills['d' + num + '_opportunity'] || 0;
    if (level > 0 || opp > 0) {
      const hasGap = opp > level;
      html += `<span class="skill-badge${hasGap ? ' has-gap' : ''}" style="${!hasGap ? 'border-left:2px solid ' + d.color : ''}">L${level} ${d.short}${hasGap ? ' &#9650;' : ''}</span>`;
    }
  }
  html += '</div>';
  return html;
}

async function loadCharts() {
  const [jStats, heatmap, sessData] = await Promise.all([
    api('/api/judgments/stats'),
    api('/api/heatmap'),
    api('/api/sessions?limit=50&sort=started_at+ASC'),
  ]);

  // Outcome distribution donut
  const od = jStats.outcome_distribution || {};
  const OUTCOME_COLORS = { completed: '#22c55e', partially_completed: '#eab308', failed: '#ef4444', abandoned: '#6b7280', exploratory: '#06b6d4' };
  destroyChart('outcome');
  if (Object.keys(od).length > 0) {
    charts.outcome = new Chart(document.getElementById('chart-outcome'), {
      type: 'doughnut',
      data: {
        labels: Object.keys(od).map(k => k.replace('_', ' ')),
        datasets: [{ data: Object.values(od), backgroundColor: Object.keys(od).map(k => OUTCOME_COLORS[k] || '#666'), borderWidth: 0 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#8b8fa3', font: { size: 12 } } } } }
    });
  }

  // Productivity trend (judged sessions only)
  const sessArr = sessData.sessions.filter(s => s.productivity_ratio != null);
  destroyChart('trends');
  if (sessArr.length > 0) {
    charts.trends = new Chart(document.getElementById('chart-trends'), {
      type: 'line',
      data: {
        labels: sessArr.map((_, i) => i + 1),
        datasets: [
          { label: 'Productivity', data: sessArr.map(s => s.productivity_ratio), borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.1)', fill: true, tension: 0.3, pointRadius: 2 },
        ]
      },
      options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { min: 0, max: 1, ticks: { color: '#8b8fa3', callback: v => (v*100)+'%' }, grid: { color: '#2e3347' } } }, plugins: { legend: { labels: { color: '#8b8fa3' } } } }
    });
  }


  // Heatmap
  renderHeatmap(heatmap.heatmap);
}

async function loadProjectHealth() {
  const projects = await api('/api/projects');
  window._projList = projects.projects;  // show all projects, not just >= 2 sessions
  renderProjectTable('sessions', true);
}

// Project health table
let _projSortKey = 'sessions', _projSortDesc = true;

function fmtCostConv(p, allProjects) {
  const totalTokens = (p.total_input_tokens || 0) + (p.total_output_tokens || 0);
  if (!totalTokens || !p.session_count) return '-';
  const tps = totalTokens / p.session_count;
  const label = fmtTokens(Math.round(tps));
  const allTps = allProjects.map(q => {
    const t = (q.total_input_tokens || 0) + (q.total_output_tokens || 0);
    return q.session_count ? t / q.session_count : 0;
  }).filter(v => v > 0).sort((a, b) => a - b);
  if (allTps.length < 2) return label;
  const median = allTps[Math.floor(allTps.length / 2)];
  if (tps < median * 0.7) return '<span style="color:var(--green)">' + label + '</span>';
  if (tps > median * 1.5) return '<span style="color:var(--red)">' + label + '</span>';
  return label;
}

function renderProjectTable(sortKey, desc) {
  _projSortKey = sortKey || _projSortKey;
  _projSortDesc = desc !== undefined ? desc : _projSortDesc;
  const projList = window._projList || [];
  const sortFns = {
    name: (a, b) => a.project_name.localeCompare(b.project_name),
    sessions: (a, b) => a.session_count - b.session_count,
    completion: (a, b) => (a.completion_rate || 0) - (b.completion_rate || 0),
    productivity: (a, b) => (a.avg_productivity || 0) - (b.avg_productivity || 0),
    errors: (a, b) => (a.total_errors || 0) - (b.total_errors || 0),
    tokens: (a, b) => ((a.total_input_tokens||0)+(a.total_output_tokens||0)) - ((b.total_input_tokens||0)+(b.total_output_tokens||0)),
    cost: (a, b) => {
      const ta = a.session_count ? ((a.total_input_tokens||0)+(a.total_output_tokens||0))/a.session_count : 0;
      const tb = b.session_count ? ((b.total_input_tokens||0)+(b.total_output_tokens||0))/b.session_count : 0;
      return ta - tb;
    },
  };
  const sorted = [...projList].sort((a, b) => {
    const v = (sortFns[_projSortKey] || sortFns.sessions)(a, b);
    return _projSortDesc ? -v : v;
  });
  const tbody = document.querySelector('#project-health-table tbody');
  tbody.innerHTML = sorted.slice(0, 15).map(p => {
    const short = shortProject(p.project_name);
    const prod = p.avg_productivity;
    const rowCls = (prod != null && prod < 0.4) ? 'row-red' : (prod != null && prod < 0.6 ? 'row-amber' : '');
    return `<tr class="${rowCls}">
      <td>${short}</td>
      <td>${p.session_count}</td>
      <td>${p.completion_rate != null ? fmtPct(p.completion_rate) : '-'}</td>
      <td style="color:${prod != null ? (prod >= 0.7 ? 'var(--green)' : prod >= 0.4 ? 'var(--yellow)' : 'var(--red)') : 'var(--text-dim)'}">${prod != null ? fmtPct(prod) : '-'}</td>
      <td>${p.total_errors || 0}</td>
      <td>${fmtTokens((p.total_input_tokens||0)+(p.total_output_tokens||0))}</td>
      <td>${fmtCostConv(p, projList)}</td>
    </tr>`;
  }).join('');
}

document.getElementById('project-health-table').addEventListener('click', e => {
  const th = e.target.closest('th[data-sort]');
  if (!th) return;
  const key = th.dataset.sort;
  const desc = _projSortKey === key ? !_projSortDesc : true;
  renderProjectTable(key, desc);
});

function renderHeatmap(data) {
  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const maxCount = Math.max(...data.map(d => d.count), 1);
  const grid = {};
  data.forEach(d => { grid[d.day + '-' + d.hour] = d; });

  let html = '<div class="heatmap"><div></div>';
  for (let h = 0; h < 24; h++) html += `<div class="heatmap-header">${h}</div>`;
  for (let d = 0; d < 7; d++) {
    html += `<div class="heatmap-label">${days[d]}</div>`;
    for (let h = 0; h < 24; h++) {
      const cell = grid[d + '-' + h];
      const count = cell ? cell.count : 0;
      const intensity = count / maxCount;
      const bg = count > 0 ? `rgba(99,102,241,${0.15 + intensity * 0.75})` : 'rgba(255,255,255,0.03)';
      html += `<div class="heatmap-cell" style="background:${bg}" title="${days[d]} ${h}:00 - ${count} sessions">${count || ''}</div>`;
    }
  }
  html += '</div>';
  document.getElementById('heatmap-container').innerHTML = html;
}

// ===== REFRESH =====
async function refreshData() {
  const btn = document.getElementById('refresh-btn');
  const progressEl = document.getElementById('refresh-progress');
  const stepEl = document.getElementById('refresh-step');
  const countEl = document.getElementById('refresh-count');
  const barEl = document.getElementById('refresh-bar');
  const concurrency = parseInt(document.getElementById('concurrency-select').value);

  btn.disabled = true;
  btn.textContent = 'Starting...';
  progressEl.style.display = 'block';
  stepEl.textContent = 'Requesting refresh...';
  countEl.textContent = '';
  barEl.style.width = '0%';

  try {
    const resp = await fetch('/api/refresh', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({concurrency}),
    });
    const result = await resp.json();
    if (!resp.ok) {
      stepEl.textContent = result.error || 'Error';
      btn.textContent = 'Run LLM Judge';
      btn.disabled = false;
      setTimeout(() => { progressEl.style.display = 'none'; }, 3000);
      return;
    }

    // Start polling for progress — reuses the same poller as init
    pollBackgroundStatus();
  } catch (e) {
    stepEl.textContent = 'Error: ' + e.message;
    btn.textContent = 'Run LLM Judge';
    btn.disabled = false;
    setTimeout(() => { progressEl.style.display = 'none'; }, 3000);
  }
}

// ===== INIT =====
async function init() {
  const progressEl = document.getElementById('refresh-progress');
  const stepEl = document.getElementById('refresh-step');
  const countEl = document.getElementById('refresh-count');
  const barEl = document.getElementById('refresh-bar');
  const btn = document.getElementById('refresh-btn');

  // Load the page immediately with whatever data exists
  try {
    const [projects, skillDims] = await Promise.all([
      api('/api/projects'),
      api('/api/skills/dimensions'),
    ]);
    populateFilters(projects.projects);
    window._skillDims = skillDims.dimensions;
  } catch (e) {
    // Server not up yet — show connecting state and retry
    progressEl.style.display = 'block';
    stepEl.textContent = 'Connecting...';
    barEl.style.width = '0%';
    countEl.textContent = '';
    setTimeout(init, 1000);
    return;
  }

  // Load the main content
  await Promise.all([
    loadVerdict(),
    loadChangeCards(),
    loadSessions(false),
  ]);

  // Check if background work is happening and show inline progress
  pollBackgroundStatus();
}

async function pollBackgroundStatus() {
  const progressEl = document.getElementById('refresh-progress');
  const stepEl = document.getElementById('refresh-step');
  const countEl = document.getElementById('refresh-count');
  const barEl = document.getElementById('refresh-bar');
  const btn = document.getElementById('refresh-btn');

  try {
    const status = await api('/api/status');
    if (!status.ready) {
      // Show inline progress bar
      progressEl.style.display = 'block';
      stepEl.textContent = status.step || 'Working...';
      btn.disabled = true;
      btn.textContent = status.state === 'judging' ? 'Judging...' : 'Running...';

      if (status.total > 0) {
        const pct = Math.round(status.current / status.total * 100);
        barEl.style.width = pct + '%';
        countEl.textContent = `${status.current} / ${status.total}`;
      } else {
        barEl.style.width = '10%';
        countEl.textContent = '';
      }

      setTimeout(pollBackgroundStatus, 1000);
      return;
    }
  } catch (e) {
    setTimeout(pollBackgroundStatus, 2000);
    return;
  }

  // Background work is done
  if (progressEl.style.display === 'block') {
    // Was showing progress — reload data
    stepEl.textContent = 'Complete!';
    barEl.style.width = '100%';
    countEl.textContent = '';

    await Promise.all([loadVerdict(), loadChangeCards()]);
    expandedSessionId = null;
    await loadSessions(false);
    chartsLoaded = false;
    projectsLoaded = false;
    skillsLoaded = false;
    const activeTab = document.querySelector('.tab-btn.active');
    if (activeTab) switchTab(activeTab.dataset.tab);

    setTimeout(() => { progressEl.style.display = 'none'; }, 2000);
  }

  btn.disabled = false;
  btn.textContent = 'Run LLM Judge';
}

init();
