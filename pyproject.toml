[project]
name = "claude-retro"
version = "0.1.0"
description = "Sprint retro for your Claude Code sessions"
license = "MIT"
requires-python = ">=3.10"
dependencies = ["anthropic>=0.40.0", "duckdb>=0.9.0", "flask>=2.0.0", "pywebview>=5.0", "watchdog>=3.0.0"]

[project.optional-dependencies]
build = ["pyinstaller>=6.0"]

[project.scripts]
claude-retro = "claude_retro.__main__:main"

[tool.setuptools.packages.find]
include = ["claude_retro*"]
